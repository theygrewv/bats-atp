<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B.A.T.S. | Blobs Against the Sky</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at top, #0c1445 0%, #050505 100%);
            color: #ffffff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; position: relative;
        }

        /* Starry Background */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 200%;
            background-image: radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)), radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0));
            background-size: 250px 250px; animation: stars-scroll 60s linear infinite; opacity: 0.4; z-index: 0;
        }
        @keyframes stars-scroll { from { transform: translateY(0); } to { transform: translateY(-50%); } }

        /* OVERLAYS */
        .overlay {
            position: fixed; inset: 0; z-index: 10000; background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(15px); display: none; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px; text-align: center;
        }
        .ui-card {
            background: #111; border: 1px solid #1a237e; padding: 40px 30px; border-radius: 24px;
            width: 100%; max-width: 340px; box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }
        .auth-input {
            width: 100%; background: #000; border: 1px solid #222; color: #fff;
            padding: 15px; margin: 15px 0; border-radius: 12px; font-size: 16px; text-align: center;
        }
        .btn-primary {
            background: #00ff88; color: #000; border: none; width: 100%;
            padding: 16px; border-radius: 40px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-secondary {
            background: none; border: 1px solid #fff; color: #fff; width: 100%;
            padding: 12px; border-radius: 40px; font-weight: 700; cursor: pointer; margin-top: 10px;
        }

        /* GAME TABLE */
        #table { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; position: relative; }
        .black-card {
            background-color: #111 !important; color: #fff !important; width: 260px; height: 360px;
            border-radius: 20px; padding: 30px; border: 1px solid #1a237e; display: flex;
            flex-direction: column; justify-content: space-between; box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }
        #hand-area {
            height: 250px; width: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(20px);
            display: flex; align-items: center; padding: 0 20px; overflow-x: auto; z-index: 20;
        }
        .white-card {
            width: 140px !important; min-width: 140px !important; height: 190px !important;
            background-color: #fff !important; color: #000 !important; border-radius: 12px;
            padding: 15px; margin: 0 10px; flex-shrink: 0; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .ghost-card { position: fixed; z-index: 9999; border-radius: 12px; padding: 20px; box-shadow: 0 30px 80px rgba(0,0,0,1); transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .ghost-played { left: calc(50% - 90px) !important; top: 30% !important; width: 180px !important; height: 250px !important; }
        .ghost-submitted { border: 5px solid #00ff88 !important; }
        .ghost-sent { transform: translateY(-120vh) scale(0.4) !important; opacity: 0; }
        
        .card-text { font-weight: 700; line-height: 1.3; pointer-events: none; }
        .footer { font-size: 8px; font-weight: 900; text-transform: uppercase; opacity: 0.5; margin-top: 10px; }
        
        #room-tag { position: fixed; top: 20px; left: 20px; font-size: 10px; font-weight: 900; color: #00ff88; z-index: 1000; }
        #czar-mode-btn { position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 10px; z-index: 1000; }
    </style>
</head>
<body>

    <div id="room-tag"></div>
    <button id="czar-mode-btn" onclick="toggleCzarRole()">Become Czar</button>

    <div id="auth-overlay" class="overlay">
        <div class="ui-card">
            <h2 style="color:#00ff88; margin:0; letter-spacing: 4px; font-size: 32px;">B.A.T.S.</h2>
            <p style="font-size:12px; opacity:0.6; margin: 10px 0 25px 0;">Blobs Against the Sky</p>
            <input type="text" id="auth-handle" class="auth-input" placeholder="handle.bsky.social">
            <button class="btn-primary" onclick="login()">Enter the Sky</button>
        </div>
    </div>

    <div id="lobby-overlay" class="overlay">
        <div class="ui-card">
            <h2 style="color:#00ff88; margin:0;">THE LOBBY</h2>
            <p style="font-size:12px; opacity:0.6; margin-bottom:20px;">Choose your room</p>
            <button class="btn-primary" onclick="hostGame()">Host New Game</button>
            <div style="margin: 20px 0; border-top: 1px solid #333; padding-top: 20px;">
                <input type="text" id="join-input" class="auth-input" placeholder="ENTER ROOM CODE">
                <button class="btn-secondary" onclick="joinGame()">Join Existing</button>
            </div>
        </div>
    </div>

    <div id="table">
        <div id="confirmation-hud" style="display:none; text-align:center; z-index:100;">
            <h1 style="color:#00ff88;">BLOB CAST</h1>
            <p>Your card has joined the Sky.</p>
            <button class="btn-primary" style="width:auto; padding: 10px 30px;" onclick="initGame()">Next Round</button>
        </div>
        <div id="main-black-card" class="black-card">
            <div id="prompt-text" class="card-text">Waiting for Blobs...</div>
            <div class="footer">Blobs Against the Sky</div>
        </div>
    </div>

    <button id="btn-capture" onclick="takeScreenshot()" style="display:none; position:fixed; bottom:120px; left:50%; transform:translateX(-50%); background:#fff; color:#000; border:none; padding:15px 30px; border-radius:40px; font-weight:900; z-index:10001;">Capture Combination</button>
    <div id="hand-area"></div>

    <script type="module">
        import { BrowserOAuthClient } from 'https://esm.sh/@atproto/oauth-client-browser';
        import { BskyAgent } from 'https://esm.sh/@atproto/api';
        
        const BASE_URL = `https://raw.githubusercontent.com/theygrewv/bats-engine/main/data`;
        const BLOBS_DID = "did:plc:5t5u6shyc4wwrenyzk4ok5rx";

        const oauthClient = new BrowserOAuthClient({
            handleResolver: 'https://bsky.social',
            clientMetadata: 'https://bats.skydrops.app/client-metadata.json',
        });

        let agent = null, currentGameID = "", isCzar = false;
        let activeGhost = null, originalCardSource = null, pressTimer, lastTap = 0, startX = 0, startY = 0, czarInterval = null, seenRecords = new Set();

        // --- SESSION ---
        async function initAuth() {
            try {
                const result = await oauthClient.init();
                if (result) {
                    agent = new BskyAgent(result.session);
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('lobby-overlay').style.display = 'flex';
                } else {
                    document.getElementById('auth-overlay').style.display = 'flex';
                }
            } catch (err) { document.getElementById('auth-overlay').style.display = 'flex'; }
        }

        window.login = async () => {
            const handle = document.getElementById('auth-handle').value;
            if (!handle) return;
            try { await oauthClient.signIn(handle); } catch (e) { console.error(e); }
        };

        // --- LOBBY ---
        function generateGameID() {
            const adj = ["NEON", "SILENT", "CHAOTIC", "GHOSTLY", "BLOODY", "VOODOO", "COSMIC", "ANGRY"];
            const noun = ["BAT", "BLOB", "SKY", "VOID", "WING", "EYE", "FANG", "GRAVE"];
            return `${adj[Math.floor(Math.random()*adj.length)]}-${noun[Math.floor(Math.random()*noun.length)]}-${Math.floor(Math.random()*99)}`;
        }

        window.hostGame = () => {
            currentGameID = generateGameID();
            startSession();
        };

        window.joinGame = () => {
            const input = document.getElementById('join-input').value.toUpperCase().trim();
            if (!input) return alert("Enter a code!");
            currentGameID = input;
            startSession();
        };

        function startSession() {
            document.getElementById('lobby-overlay').style.display = 'none';
            document.getElementById('room-tag').innerText = `ROOM: ${currentGameID}`;
            window.initGame();
        }

        // --- GAME ENGINE ---
        window.initGame = async () => {
            document.getElementById('confirmation-hud').style.display = 'none';
            document.getElementById('main-black-card').style.opacity = '1';
            clearBoardState();
            try {
                const manifest = await (await fetch(`${BASE_URL}/manifest.json`)).json();
                const bId = String(Math.floor(Math.random() * manifest.stats.blackCardsCount) + 1).padStart(3, '0');
                const bCard = await (await fetch(`${BASE_URL}/cards/black/prompt-${bId}.json`)).json();
                document.getElementById('prompt-text').innerText = bCard.text;
                
                const handArea = document.getElementById('hand-area');
                handArea.innerHTML = '';
                for(let i=0; i<5; i++) {
                    let rId = Math.floor(Math.random() * manifest.stats.whiteCardsCount) + 1;
                    const wCard = await (await fetch(`${BASE_URL}/cards/white/response-${String(rId).padStart(3, '0')}.json`)).json();
                    const cardDiv = document.createElement('div');
                    cardDiv.className = 'white-card';
                    cardDiv.innerHTML = `<div class="card-text">${wCard.text}</div><div class="footer">Response Blob</div>`;
                    setupTactileEvents(cardDiv, () => playCard(cardDiv), true);
                    handArea.appendChild(cardDiv);
                }
            } catch (e) { console.error(e); }
        };

        window.toggleCzarRole = () => {
            isCzar = !isCzar;
            const btn = document.getElementById('czar-mode-btn');
            if (isCzar) {
                btn.innerText = "Exit Czar"; btn.style.background = "#00ff88"; btn.style.color = "#000";
                startCzarView();
            } else {
                location.reload();
            }
        };

        function startCzarView() {
            document.getElementById('table').innerHTML = `<div id="czar-grid" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px; padding:20px;"></div>`;
            document.getElementById('hand-area').style.display = 'none';
            czarInterval = setInterval(scanTheSky, 4000);
            scanTheSky();
        }

        async function scanTheSky() {
            if (!agent) return;
            try {
                // Scanning Blobs DID specifically for this gameID
                const response = await agent.api.com.atproto.repo.listRecords({
                    repo: BLOBS_DID, 
                    collection: 'app.skydrops.bats.card',
                    limit: 20, reverse: true
                });
                const grid = document.getElementById('czar-grid');
                response.data.records.forEach(record => {
                    if (record.value.gameID === currentGameID && !seenRecords.has(record.uri)) {
                        seenRecords.add(record.uri);
                        const card = document.createElement('div');
                        card.className = 'white-card';
                        card.style.transform = `rotate(${Math.random() * 8 - 4}deg)`;
                        card.innerHTML = `<div class="card-text">${record.value.text}</div><div class="footer">CAST FROM SKY</div>`;
                        grid.prepend(card);
                    }
                });
            } catch (e) { console.error(e); }
        }

        window.sendToCzar = async () => {
            if (!agent || !activeGhost) return;
            try {
                const text = activeGhost.querySelector('.card-text').innerText;
                await agent.api.com.atproto.repo.createRecord({
                    repo: BLOBS_DID,
                    collection: 'app.skydrops.bats.card',
                    record: { 
                        $type: 'app.skydrops.bats.card', 
                        text: text, 
                        gameID: currentGameID,
                        createdAt: new Date().toISOString() 
                    }
                });
                activeGhost.classList.add('ghost-sent');
                setTimeout(() => { document.getElementById('confirmation-hud').style.display = 'block'; }, 600);
            } catch (err) { alert("The Sky is full. Try again."); }
        };

        // --- INTERACTION LOGIC ---
        function setupTactileEvents(el, action, isHandCard = false) {
            el.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                pressTimer = setTimeout(() => {
                    if (isHandCard) { playCard(el); setTimeout(submitToCzar, 50); }
                    else { submitToCzar(); }
                }, 650);
            }, { passive: true });
            el.addEventListener('touchend', (e) => {
                clearTimeout(pressTimer);
                if (Math.abs(e.changedTouches[0].clientX - startX) < 10) {
                    if (!isHandCard && activeGhost?.classList.contains('ghost-submitted')) sendToCzar();
                    else if (action) action();
                }
            });
        }

        function playCard(cardDiv) {
            if (activeGhost) clearBoardState();
            const rect = cardDiv.getBoundingClientRect();
            const ghost = document.createElement('div');
            ghost.className = 'ghost-card'; ghost.style.backgroundColor = '#fff';
            ghost.innerHTML = cardDiv.innerHTML; ghost.style.left = rect.left + 'px'; ghost.style.top = rect.top + 'px';
            document.body.appendChild(ghost);
            activeGhost = ghost; originalCardSource = cardDiv; cardDiv.style.opacity = '0.2';
            setupTactileEvents(ghost, null, false);
            requestAnimationFrame(() => { requestAnimationFrame(() => { ghost.classList.add('ghost-played'); }); });
        }

        function submitToCzar() {
            if (!activeGhost) return;
            activeGhost.classList.add('ghost-submitted');
            document.getElementById('btn-capture').style.display = 'block';
            document.getElementById('hand-area').style.transform = 'translateY(300px)';
        }

        function clearBoardState() {
            if (activeGhost) { activeGhost.remove(); activeGhost = null; }
            if (originalCardSource) { originalCardSource.style.opacity = '1'; }
            document.getElementById('btn-capture').style.display = 'none';
            document.getElementById('hand-area').style.transform = 'translateY(0)';
        }

        window.takeScreenshot = () => {
            if(!activeGhost) return;
            const captureContainer = document.createElement('div');
            captureContainer.style.cssText = 'display:flex; flex-direction:column; align-items:center; background:#050505; padding:40px; width:360px;';
            const blackClone = document.getElementById('main-black-card').cloneNode(true);
            const whiteClone = activeGhost.cloneNode(true);
            blackClone.style.cssText = `position:static; width:280px; height:380px; border-radius:24px; background:#111; color:#fff; padding:35px; opacity:1 !important; margin-bottom: -100px; z-index: 1;`;
            whiteClone.classList.remove('ghost-played', 'ghost-submitted');
            whiteClone.style.cssText = `position:static; width:280px; height:380px; border-radius:24px; background:#fff; color:#000; padding:35px; transform:rotate(-3deg); z-index: 2; box-shadow: 0 20px 50px rgba(0,0,0,0.5);`;
            whiteClone.querySelector('.card-text').style.cssText = 'font-weight:700; font-size:24px; color:#000 !important;';
            captureContainer.appendChild(blackClone); captureContainer.appendChild(whiteClone);
            document.body.appendChild(captureContainer);
            html2canvas(captureContainer, { backgroundColor: '#050505', scale: 2 }).then(canvas => {
                const imgData = canvas.toDataURL("image/png");
                captureContainer.remove();
                const win = window.open();
                win.document.write(`<body style="margin:0; background:#050505; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;"><img src="${imgData}" style="max-width:90%; border-radius:15px;" /><p style="color:#00ff88; font-family:sans-serif; margin-top:20px; font-weight:900;">LONG-PRESS TO SAVE BLOB</p></body>`);
            });
        };

        initAuth();
    </script>
</body>
</html>
